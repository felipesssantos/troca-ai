name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        run: |
          echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_MINIO_ENDPOINT=${{ secrets.VITE_MINIO_ENDPOINT }}
            VITE_MINIO_ACCESS_KEY=${{ secrets.VITE_MINIO_ACCESS_KEY }}
            VITE_MINIO_SECRET_KEY=${{ secrets.VITE_MINIO_SECRET_KEY }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: prd

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # 1. Navigate to project directory
            mkdir -p ~/troca-ai
            cd ~/troca-ai

            # 2. Pull latest changes
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            fi

            git reset --hard HEAD
            rm -f .env || true
            git pull origin main

            # 3. Create .env file for docker-compose configuration
            echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
            echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
            echo "VITE_MINIO_ENDPOINT=${{ secrets.VITE_MINIO_ENDPOINT }}" >> .env
            echo "VITE_MINIO_ACCESS_KEY=${{ secrets.VITE_MINIO_ACCESS_KEY }}" >> .env
            echo "VITE_MINIO_SECRET_KEY=${{ secrets.VITE_MINIO_SECRET_KEY }}" >> .env
            
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            echo "GH_REPO=$REPO_LOWER" >> .env

            # 4. Login to GHCR (required if the repository/package is private)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 5. Pull the latest image and start via docker compose (declarative)
            docker compose pull
            docker compose up -d

            # 6. Cleanup old images
            docker image prune -af
